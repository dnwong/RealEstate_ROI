# Portainer: Stacks → Add stack → Web editor → paste this file.
# After each GitHub Actions build, redeploy so Portainer pulls the new image.
services:
  realestate-roi:
    image: ghcr.io/dnwong/realestate-roi:latest
    pull_policy: always
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      NODE_ENV: production
    shm_size: "1gb"
    init: true
    restart: unless-stopped
