# Pull pre-built image from GitHub Container Registry (after Actions build succeeds).
# Portainer: Stacks → Add stack → paste this file.
#
# Image URL (must be lowercase):
#   ghcr.io/dnwong/realestate-roi:latest
#
# If you previously used dnwong/RealEstate_ROI or realestate_roi, that causes "manifest unknown".

services:
  realestate-roi:
    image: ghcr.io/dnwong/realestate-roi:latest
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      NODE_ENV: production
    shm_size: "1gb"
    init: true
    restart: unless-stopped
