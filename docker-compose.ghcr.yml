# Portainer: Stacks → Add stack → paste this file.
# Replace IMAGE_TAG with the short git SHA from a green Actions run (e.g. 9888a5c).
services:
  realestate-roi:
    image: ghcr.io/dnwong/realestate-roi:${IMAGE_TAG:-latest}
    pull_policy: always
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      NODE_ENV: production
      PLAYWRIGHT_IN_DOCKER: "1"
    shm_size: "1gb"
    init: true
    restart: unless-stopped
