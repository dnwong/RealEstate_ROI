# Local build (optional). For Portainer/GHCR use docker-compose.ghcr.yml instead.
services:
  realestate-roi:
    build:
      context: .
      dockerfile: Dockerfile
    image: realestate-roi:local
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      NODE_ENV: production
    shm_size: "1gb"
    init: true
    restart: unless-stopped
